name: Bug Report
description: Report a bug or unexpected behavior in ProwlrBot
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the form below so we can investigate and fix the issue quickly.

        **Before filing**, please search [existing issues](https://github.com/prowlrbot/prowlrbot/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Install ProwlrBot with `pip install prowlrbot`
        2. Run `prowlr init --defaults`
        3. Configure the Telegram channel
        4. Send a message containing '...'
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, tracebacks, or screenshots if available.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of ProwlrBot is affected?
      multiple: true
      options:
        - Backend (FastAPI app, agents, config, providers)
        - Console (React frontend)
        - Website (docs site)
        - CLI (`prowlr` command)
        - Channels (Discord, Telegram, DingTalk, Feishu, QQ, iMessage, Console)
        - Monitoring (web/API detectors, notifications)
        - Skills (built-in or custom)
        - MCP Integration
        - Local Models (llama.cpp, MLX, Ollama)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (other)
        - Windows
        - Docker
        - Other
    validations:
      required: true

  - type: dropdown
    id: python
    attributes:
      label: Python Version
      options:
        - "3.13"
        - "3.12"
        - "3.11"
        - "3.10"
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ProwlrBot Version
      description: Output of `prowlr --version` or the commit SHA you are running.
      placeholder: e.g. 0.1.0 or commit abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output or tracebacks. This will be automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, configuration details, or screenshots.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am using a supported Python version (3.10+).
          required: false
