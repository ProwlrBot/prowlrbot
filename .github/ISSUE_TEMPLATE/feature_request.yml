name: Feature Request
description: Suggest a new feature or improvement for ProwlrBot
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas for making ProwlrBot better. Please describe your feature request in detail so we can evaluate and prioritize it.

        **Before filing**, check [existing issues](https://github.com/prowlrbot/prowlrbot/issues) and [discussions](https://github.com/prowlrbot/prowlrbot/discussions) to see if this has already been proposed.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the pain point or limitation you are experiencing.
      placeholder: "I'm frustrated when... / It would be much better if... / Currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible about the behavior, API, configuration, or UI you envision.
      placeholder: Describe your ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches or workarounds have you considered? Why are they insufficient?
      placeholder: Describe alternatives you've considered...
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component Area
      description: Which part of ProwlrBot does this feature relate to?
      multiple: true
      options:
        - Backend (FastAPI app, agents, config, providers)
        - Console (React frontend)
        - Website (docs site)
        - CLI (`prowlr` command)
        - Channels (Discord, Telegram, DingTalk, Feishu, QQ, iMessage, Console)
        - Monitoring (web/API detectors, notifications)
        - Skills (built-in or custom)
        - MCP Integration
        - Local Models (llama.cpp, MLX, Ollama)
        - Multi-Agent / War Room
        - Security / Auth
        - DevOps / Deployment
        - Other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope of Change
      description: How large do you estimate this change to be?
      options:
        - Small (config change, minor tweak)
        - Medium (new skill, new channel, moderate feature)
        - Large (new subsystem, architectural change)
        - Not sure
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, references, or examples that help explain the feature.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and discussions and this is not a duplicate.
          required: true
        - label: I am willing to contribute this feature via a pull request.
          required: false
