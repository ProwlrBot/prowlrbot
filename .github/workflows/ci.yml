name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python: lint, format, test across matrix
  # ---------------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Run pre-commit
        run: |
          pre-commit install
          pre-commit run --all-files

      - name: Run tests
        run: pytest -m "not slow" --tb=short -q

  # ---------------------------------------------------------------------------
  # Console frontend build
  # ---------------------------------------------------------------------------
  console:
    name: Console frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b937b190fe8 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        working-directory: console
        run: npm ci

      - name: Format check
        working-directory: console
        run: npm run format:check

      - name: Build
        working-directory: console
        run: npm run build

  # ---------------------------------------------------------------------------
  # Website frontend build
  # ---------------------------------------------------------------------------
  website:
    name: Website frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b937b190fe8 # v4.4.0
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Format check
        working-directory: website
        run: pnpm run format:check

      - name: Build
        working-directory: website
        run: pnpm run build
