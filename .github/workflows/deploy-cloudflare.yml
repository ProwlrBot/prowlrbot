name: Deploy Website to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642195f572a2b937b190fe8 # v4.4.0
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build
        env:
          VITE_BASE_PATH: "/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0e55abcff1becef5a6dff151f01852d5da74 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=prowlrbot
