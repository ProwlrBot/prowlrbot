# fly.toml — ProwlrBot on Fly.io
#
# Quick start:
#   fly auth login
#   fly apps create prowlrbot          # pick a unique name
#   fly volumes create prowlrbot_data --region lax --size 3
#   fly secrets set PROWLRBOT_SECRET_KEY="$(openssl rand -hex 32)"
#   fly secrets set OPENAI_API_KEY="sk-..."    # or your provider
#   fly deploy --dockerfile deploy/Dockerfile.fly
#
# After deploy:
#   fly open          → opens https://<app>.fly.dev
#   fly logs -f       → tail live logs
#   fly ssh console   → shell into the machine
#   fly status        → check VM health
#
# Secrets (set with `fly secrets set KEY=value`):
#   PROWLRBOT_SECRET_KEY   — random hex string for session signing
#   OPENAI_API_KEY         — or ANTHROPIC_API_KEY, GROQ_API_KEY, etc.
#   PROWLRBOT_ADMIN_PASS   — optional: lock the UI behind a password

app = "prowlrbot"           # change to your unique app name
primary_region = "lax"      # Los Angeles — change to your nearest region
