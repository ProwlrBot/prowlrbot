# Persistent volume — stores config, chats, skills, memory
[[mounts]]
  source = "prowlrbot_data"
  destination = "/data"

# VM size — shared-cpu-2x is a good starting point
# Upgrade to performance-1x for heavier workloads
[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# Environment variables (non-secret)
[env]
  PROWLRBOT_WORKING_DIR = "/data"
  PROWLRBOT_RUNNING_IN_CONTAINER = "1"
  PROWLRBOT_PORT = "8088"
  # Skip Playwright browser download (no browser in lean image)
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

# Deployment strategy — rolling ensures zero downtime
[deploy]
  strategy = "rolling"
  release_command = "prowlr init --defaults --accept-security"
